<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="index.css">

  />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<body class="body">
    <header class="header">
        <div class="container-fluid iaAndTaverneHud">
            <button type="button" onclick="actualiserBoutique()" class="btn btn-outline-warning">Actualiser (-1💰)</button>
                <p id="playerLvlTaverne" class="playerLvlTaverne">1</p>
                <img class="imgPlayerLvlTaverne" src="img/tavernierChoune.png" alt="">
                
            
            
            <div>
                <img class="imgHudOrTaverne" src="img/hud_or.png" alt="">
                <p id="taverneCost" class="taverneCost">6</p>
            </div>
            
            <button type="button" id="" onclick="" class="btn btn-outline-warning">passer un lvl</button>

        </div>

    </header>
    <main class="main">
        <div class="iaBoard">
            <div class="cards">
                <div class="cardfight ia content-card animate__animated animate__headShake" data-id="1">
                
                    <img class="cardimgIa " src="img/imgcard1.png" alt="nomdecarte">
    
                    <div class="hudCardFightAtk">
                        <p>⚔️ 3</p>
                    </div>
                        
                    <div class="hudCardFightPv">
                        <p> ❤️ 3</p>
                    </div>
                    
                </div>
                <div class="glow"></div>
            </div>
            
            
        </div>
        <div class="shopBoard">
            
        </div>
        <div class="playerBoard">
            <div class="cardfight " data-id="2">
                
                <img class="cardimg " src="img/imgcard1.png" alt="nomdecarte">

                <div class="hudCardFightAtk">
                    <p>⚔️ 3</p>
                </div>
                    
                <div class="hudCardFightPv">
                    <p> ❤️ 3</p>
                </div>
                <div class="hudsell">
                    <button class="btn btn-danger btn-sell" data-id="${carte.id}">Vendre (+1💰)</button>
                </div>
                
            </div>

            <div class="cardfight">
                
                <img class="cardimg" src="img/imgcard1.png" alt="">
                
                <div class="hudCardFightAtk">
                    <p>⚔️ 3</p>
                </div>
                    
                <div class="hudCardFightPv">
                    <p> ❤️ 3</p>
                </div>
                <div class="hudsell">
                    <button class="btn btn-danger btn-sell" data-id="${carte.id}">Vendre (+1💰)</button>
                </div>
                
            </div>

            

    </main>
    <footer class="footer">
        <div class="playerDeck d-flex">
            <div class="cards1">
                <div class="cardInDeck0 text-white bg-dark mb-3 me-2 content-card1" data-id="1" style="width: 15rem;" 
                    draggable="true" 
                    ondragstart="startDrag(event, 1)">
                    <img class="card-img-top" src="img/imgcard1.png" alt="Image de ">
                    <div class="card-body">
                        <h5 class="card-title">Yo le test</h5>
                        <div class="card-footer d-flex justify-content-between">
                            <p>❤️ 3</p>
                            <p>⚔️ 3</p>
                        </div>
                        <button class="btn btn-danger btn-sell" data-id="1">Vendre (+1💰)</button>
                    </div>
                </div>
                <div class="glow1"></div>
            </div>
            

        </div>
        <div class="playerHud">
            <p id="playerPv" class="playerPv">30</p>
            <img src="img/persololo.png" alt="">           
            <div class="orAndLvlContainer">
                <div class="hudOr">
                    <img class="imgHudOr" src="img/hud_or.png" alt="">
                    <p id="playerOr" class="playerOr">3</p>
                </div>
                <div class="hudlvl">
                    <img class="imgHudLvl" src="img/hud_lvl.png" alt="">
                    <p id="playerLvl" class="playerLvl">1</p>
                </div>
            </div>
            
        </div>
        <div class="nextPhaseButton">
            <button class="btn btn-success btn-phaseSuivante" data-id="1">phase suivante</button>
        </div>



    </footer>
<script src="data/data.js"></script>  
<script src="fonctions/animations.js"></script>  
<script src="test.js"></script>
